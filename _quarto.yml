project:
  type: website
  output-dir: _site

website:
  title: "Rama's Research Portfolio"
  description: "PhD Researcher | Research Progress and Projects"
  site-url: "https://rizqrama.github.io"
  favicon: assets/profile.jpeg
  open-graph: true
  twitter-card: true
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: meetings/index.qmd
        text: Weekly Progress
      - href: publications/index.qmd
        text: Publications
      - href: projects/index.qmd
        text: Projects
    right:
      - icon: github
        href: https://github.com/rizqrama
        aria-label: GitHub
  search:
    location: navbar
    type: overlay
  page-footer:
    center: "© Rizqi Ramadhan · Made with [Quarto](https://quarto.org)"

format:
  html:
    theme:
      light: [cosmo, theme-light.scss, theme-rules.scss]
      dark: [darkly, theme-dark.scss, theme-rules.scss]
    toc: true
    toc-depth: 2
    toc-location: left
    smooth-scroll: true
